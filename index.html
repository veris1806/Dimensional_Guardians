<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dimensional Guardians</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="game-container">
    <header id="hud">
      <div class="stat">Base: <span id="base-health">100</span> ❤️</div>
      <div class="stat">Oleada: <span id="wave-number">1</span> 💀</div>
      <div class="stat">Energía: <span id="magic-energy">0</span>/10 ☀️</div>
    </header>

    <main id="lanes-container">
      <div id="home-zone"></div>
      
      <div class="lane" id="lane-1"></div>
      <div class="lane" id="lane-2"></div>
      <div class="lane" id="lane-3"></div>
    </main>

    <footer id="selection-bar">
      <button class="guardian-btn" data-type="tanque">
        <img src="tanquee.png" alt="Tanque" class="btn-img">
        <span class="cost">3 ☀️</span>
      </button>

      <button class="guardian-btn" data-type="arquero">
        <img src="arqueroo.png" alt="Arquero" class="btn-img">
        <span class="cost">2 ☀️</span>
      </button>

      <button class="guardian-btn" data-type="mago">
        <img src="magoo.png" alt="Mago" class="btn-img">
        <span class="cost">4 ☀️</span>
      </button>

      <button class="guardian-btn" data-type="ninja">
        <img src="ninjaa.png" alt="Ninja" class="btn-img">
        <span class="cost">5 ☀️</span>
      </button>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
